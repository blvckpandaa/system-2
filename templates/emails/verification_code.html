<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Подтверждение email</title>
</head>
<body style="margin:0;padding:0;background:#f3f5f7;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f3f5f7;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:92%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.08);">
          <tr>
            <td style="padding:18px 22px;background:linear-gradient(135deg,#2E8B57 0%,#3CB371 100%);color:#fff;">
              <div style="font-size:18px;font-weight:700;">Чистый Мир</div>
              <div style="font-size:12px;opacity:.9;margin-top:4px;">Подтверждение регистрации</div>
            </td>
          </tr>
          <tr>
            <td style="padding:22px;">
              <h1 style="margin:0 0 10px 0;font-size:20px;color:#2C3E50;">Подтвердите email</h1>
              <p style="margin:0 0 14px 0;color:#4b5563;font-size:14px;line-height:1.6;">
                Здравствуйте, <b>{{ username }}</b>! Введите этот код на сайте <b>{{ site_domain }}</b>:
              </p>
              <div style="margin:20px 0;text-align:center;">
                <span style="display:inline-block;font-size:32px;font-weight:700;letter-spacing:8px;padding:16px 28px;background:#f6fbf8;border:2px dashed #2E8B57;border-radius:12px;color:#2E8B57;">
                  {{ code }}
                </span>
              </div>
              <p style="margin:0;color:#6b7280;font-size:13px;line-height:1.5;">
                Код действует <b>{{ ttl_minutes }} минут</b>. Если вы не регистрировались — проигнорируйте письмо.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:14px 22px;background:#f9fafb;color:#9ca3af;font-size:12px;text-align:center;">
              © {{ year }} Чистый Мир
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
