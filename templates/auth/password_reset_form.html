{% extends "base.html" %}
{% block title %}Сброс пароля — Чистый Мир{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4 p-md-5">
          <h1 class="h4 mb-2 fw-bold">Сброс пароля</h1>
          <p class="text-muted mb-4">
            Укажи email — мы отправим ссылку для установки нового пароля.
          </p>

          <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" name="email" class="form-control form-control-lg" required placeholder="name@example.com">
              <div class="invalid-feedback">Введите корректный email.</div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">
              Отправить письмо
            </button>

            <div class="text-center mt-3">
              <a href="{% url 'login' %}" class="text-muted small">Вернуться ко входу</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');
  Array.prototype.slice.call(forms).forEach(function (form) {
    form.addEventListener('submit', function (event) {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>
{% endblock %}
